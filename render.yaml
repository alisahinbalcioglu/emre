# ═════════════════════════════════════════════════════════════
#  MetaPrice SaaS — Render Blueprint
# ═════════════════════════════════════════════════════════════
# Render dashboard → New + → Blueprint → bu repoyu secerek tum
# altyapi (Postgres + NestJS API + Python DWG Engine) tek tikta kurulur.
#
# NOT — Free tier kisitlari:
#  - Postgres 30 gun sonra silinir (prod icin Starter'a gec, $7/ay)
#  - Web servisleri 15dk idle → uyku (ilk istek ~60s soguk kalkis)
#  - Private Services free'de yok → Python engine public ama
#    INTERNAL_API_TOKEN ile NestJS-only erisim saglanir.
#
# Upgrade yolu: `plan: free` → `plan: starter` her servis icin.
# Python'u gercek private yapmak icin: `type: web` → `type: pserv`.
# ═════════════════════════════════════════════════════════════

databases:
  - name: metaprice-db
    databaseName: metaprice
    user: metaprice
    plan: free          # 30 gun, 1GB — prodda Starter'a gec
    region: frankfurt   # Turkiye icin en dusuk gecikme
    postgresMajorVersion: 16

services:
  # ───────────────────────────────────────────────────────
  # 1) Python DWG Engine — FastAPI + ezdxf + libredwg-tools
  #    Public URL ama INTERNAL_API_TOKEN ile kilitli.
  #    Docker runtime cunku DWG→DXF icin libredwg-tools (apt) lazim
  #    (Native Python runtime sistem paketi yukletmiyor).
  # ───────────────────────────────────────────────────────
  - type: web
    name: metaprice-dwg-engine
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: backend/src/modules/dwg-engine/python
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # NestJS'ten gelen her istek bu token'i X-Internal-Token header'inda tasimali.
      # `sync: false` → dashboard'dan elle set et. Generate value KULLANMIYORUZ
      # cunku servis yeniden olusturuldugunda (runtime degisikligi vs.) yeni
      # random token uretiyor ve NestJS DWG_ENGINE_TOKEN ile mismatch oluyor.
      # Manuel ayni string her iki yerde (asagiya bak) = sync sorunu bitti.
      - key: INTERNAL_API_TOKEN
        sync: false
      # Claude API — dashboard'dan elle set et
      - key: ANTHROPIC_API_KEY
        sync: false

  # ───────────────────────────────────────────────────────
  # 2) NestJS API — Prisma + PostgreSQL + multer
  # ───────────────────────────────────────────────────────
  - type: web
    name: metaprice-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    # --include=dev zorunlu: NODE_ENV=production oldugu icin npm normalde
    # devDependencies'i atlar, ama @nestjs/cli dev'de → `nest build` icin lazim
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Database — otomatik baglanir
      - key: DATABASE_URL
        fromDatabase:
          name: metaprice-db
          property: connectionString
      # JWT — Render rastgele secret uretir, rotation kolay
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Python engine baglantisi — host fromService, https prefix service.ts'de
      - key: DWG_ENGINE_HOST
        fromService:
          type: web
          name: metaprice-dwg-engine
          property: host
      # Python servisinin INTERNAL_API_TOKEN'i ile AYNI deger olmali.
      # Daha once fromService.envVarKey ile cross-sync kullaniyorduk; ancak
      # Python servisi yeniden olustugu durumlarda (Docker runtime gecisi gibi)
      # generateValue yenileniyor, NestJS env eski deger ile kalip 401 firlatiyordu.
      # Cozum: her iki yerde sync: false + dashboard'dan ayni string elle gir.
      # Diagnostics: NestJS 401 alirsa dwg-engine.service.ts artik acik mesaj
      # ("DWG Engine yetkilendirme hatasi") firlatir, log'da net hata gorunur.
      - key: DWG_ENGINE_TOKEN
        sync: false
      # CORS — Netlify deploy sonrasi buraya frontend URL'i gir
      # Ornek: "https://metaprice.netlify.app,https://metaprice.com"
      - key: CORS_ORIGINS
        sync: false
      # Claude API — dashboard'dan elle set et (rotate edilmis yeni key)
      - key: ANTHROPIC_API_KEY
        sync: false
