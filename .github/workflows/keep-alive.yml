name: Keep Render services awake

# Render free tier servisleri 15 dakika idle'dan sonra uyuyor — sonraki
# istek 30-60sn cold start. Her 14 dakikada bir /health endpoint'lerine
# ping atarak servisleri sicak tut. GitHub Actions free tier, public
# repo'larda sinirsiz minute, private'da 2000/ay (workflow ~5sn surer).
#
# Not: GitHub cron schedule "best effort" — yuksek yukte 5-15 dk gecikme
# olabilir. 14 dk interval bunun ustune marj birakir; ortalama 15 dk
# threshold ile carpisma riski dusuk.

on:
  schedule:
    - cron: '*/14 * * * *'   # her 14 dakikada bir
  workflow_dispatch:          # manual tetikleme icin "Run workflow" butonu

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping NestJS API
        run: |
          echo "Pinging NestJS API..."
          curl -fsS --max-time 90 -w "\nHTTP %{http_code} | %{time_total}s\n" \
            https://metaprice-api.onrender.com/api/health || echo "API ping failed (will retry next cycle)"

      - name: Ping DWG Engine
        run: |
          echo "Pinging DWG Engine..."
          curl -fsS --max-time 90 -w "\nHTTP %{http_code} | %{time_total}s\n" \
            https://metaprice-dwg-engine.onrender.com/health || echo "DWG ping failed (will retry next cycle)"
